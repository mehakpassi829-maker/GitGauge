<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GitGauge AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}?v=2">
    <link rel="shortcut icon" href="{{ url_for('static', path='img/logo.png') }}" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="app-shell">

    <aside class="sidebar">
        <div class="sidebar-logo">
            <img src="{{ url_for('static', path='img/logo.png') }}" alt="GitGauge" class="logo-img">
            <span class="logo-text">Git<span class="logo-accent">Gauge</span></span>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-label">Analysis</div>
            <a class="nav-item active" href="#">
                <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><rect x="1" y="8" width="3" height="7" rx="1" fill="currentColor" opacity=".5"/><rect x="6" y="5" width="3" height="10" rx="1" fill="currentColor"/><rect x="11" y="2" width="3" height="13" rx="1" fill="currentColor" opacity=".7"/></svg>
                Dashboard
            </a>
            <a class="nav-item" href="#">
                <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M8 5v4l2.5 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                Commit Intel
            </a>
            <a class="nav-item" href="#">
                <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><rect x="1" y="5" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="2" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg>
                Architect
            </a>
            <a class="nav-item" href="#">
                <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><polyline points="1,12 4,7 7,9 10,4 13,6" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
                Algorithm
            </a>
            <a class="nav-item" href="#">
                <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><circle cx="5" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/><circle cx="11" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M2 14c0-2.2 1.3-4 3-4h6c1.7 0 3 1.8 3 4" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
                Collaboration
            </a>
            <a class="nav-item" href="#">
                <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/><line x1="5" y1="6" x2="11" y2="6" stroke="currentColor" stroke-width="1.2"/><line x1="5" y1="9" x2="9" y2="9" stroke="currentColor" stroke-width="1.2" opacity=".6"/></svg>
                Docs
            </a>
            <a class="nav-item" href="#">
                <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M2 14c0-2.5 2.7-4.5 6-4.5s6 2 6 4.5" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
                Developer
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="ai-badge">⚡ AI Powered</div>
        </div>
    </aside>

    <div class="main-wrap">
        <header class="topbar">
            <span class="topbar-title">Developer Intelligence Dashboard</span>
            <div class="topbar-status">
                <span class="live-dot"></span>
                <span>Live Analysis</span>
            </div>
        </header>
        <div class="page-body">
            {% block content %}{% endblock %}
        </div>
    </div>

</div>

<script src="/static/js/script.js"></script>
</body>
</html>
